name: Deploy to Hostinger

on:
  push:
    branches:
      - main  # Se déclenche à chaque push sur la branche main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4

      - name: 🟢 Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Installer les dépendances
        run: npm ci

      - name: 🔨 Build du projet
        run: npm run build
        # Le dossier de sortie sera "dist/"

      - name: 🚀 Déployer sur Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/         # Dossier buildé par Vite
          server-dir: /public_html/  # Dossier cible sur Hostinger
          dangerous-clean-slate: false
